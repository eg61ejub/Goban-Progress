<!DOCTYPE html>
<html>

<head>
  <link rel="icon" type="image/png" href="/favicon.png">
</head>
<body>

<h1>Go Server Test</h1>
<button onclick="sendMove()">Send Test Move</button>

<script src="/socket.io/socket.io.js"></script>

<script>

let socket = io()

function sendMove() {

  socket.emit("move", {
    x: 1,
    y: 1,
    player: 1
  })

}

socket.on("move", data => {

  console.log("Move received:", data)

})

</script>

</body>
</html>
